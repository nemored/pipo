name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - 'main'
      - 'feature/matrix'
      - 'feature/elixir-supervisor'

env:
  SUPPORTED_TARGET_TRIPLES: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-unknown-linux-musl

jobs:
  resolve-targets:
    name: Resolve packaging target matrix
    runs-on: ubuntu-latest
    outputs:
      target_matrix: ${{ steps.resolve.outputs.target_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve targets from SUPPORTED_TARGET_TRIPLES
        id: resolve
        env:
          SUPPORTED_TARGET_TRIPLES: ${{ env.SUPPORTED_TARGET_TRIPLES }}
        run: ./packaging/resolve_compatibility_matrix.py

  rust-transport-runtime:
    name: Rust / native-transport-runtime (lint-test-build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/transport_runtime
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-targets --all-features
      - name: Build
        run: cargo build --all-targets --all-features --verbose

  elixir-pipo-supervisor:
    name: Elixir / apps-pipo-supervisor (lint-test-build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pipo_supervisor
    steps:
      - uses: actions/checkout@v4
      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          elixir-version: "1.17.2"
      - name: Dependencies
        run: mix deps.get
      - name: Lint
        run: mix format --check-formatted
      - name: Test
        run: mix test --exclude integration
      - name: Build
        run: mix compile --warnings-as-errors

  integration-protocol-supervision:
    name: Integration / protocol-supervision
    runs-on: ubuntu-latest
    needs:
      - rust-transport-runtime
      - elixir-pipo-supervisor
    defaults:
      run:
        working-directory: apps/pipo_supervisor
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          elixir-version: "1.17.2"
      - name: Build pipo-transport
        working-directory: ${{ github.workspace }}
        run: |
          cargo build --manifest-path native/transport_runtime/Cargo.toml --bin pipo-transport
          echo "PIPO_TRANSPORT_BIN=$GITHUB_WORKSPACE/target/debug/pipo-transport" >> "$GITHUB_ENV"
      - name: Run protocol supervision integration tests
        run: |
          mix deps.get
          mix test --only integration

  tarball-assembly:
    name: Packaging / tarball-assembly (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.target_matrix) }}
    needs:
      - resolve-targets
      - integration-protocol-supervision
    steps:
      - uses: actions/checkout@v4
      - name: Prepare bootstrap runtime binaries
        run: |
          mkdir -p bin
          cat > bin/pipo_supervisor <<'SCRIPT'
          #!/usr/bin/env bash
          echo '{"type":"ready","source":"bootstrap-ci"}'
          SCRIPT
          cat > bin/pipo-transport <<'SCRIPT'
          #!/usr/bin/env bash
          echo 'bootstrap transport runtime'
          SCRIPT
          chmod +x bin/pipo_supervisor bin/pipo-transport
      - name: Assemble runtime tarball
        env:
          TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: ./packaging/build_tarball.sh
      - name: Validate release manifest and checksums
        run: |
          shopt -s nullglob
          artifacts=(dist/pipo-*-${{ matrix.target_triple }}.tar.gz)
          shopt -u nullglob
          test "${#artifacts[@]}" -eq 1
          ./packaging/validate_release_metadata.sh "${artifacts[0]}"
      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipo-runtime-${{ matrix.target_triple }}
          path: dist/pipo-*-${{ matrix.target_triple }}.tar.gz

  extract-and-smoke-test:
    name: Packaging / extract-and-smoke-test (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.target_matrix) }}
    needs:
      - resolve-targets
      - tarball-assembly
    steps:
      - uses: actions/checkout@v4
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: pipo-runtime-${{ matrix.target_triple }}
          path: dist
      - name: Extract and smoke test
        env:
          SMOKE_READY_TIMEOUT_SECONDS: ${{ matrix.smoke_ready_timeout_seconds }}
        run: |
          shopt -s nullglob
          artifacts=(dist/pipo-*-${{ matrix.target_triple }}.tar.gz)
          shopt -u nullglob
          test "${#artifacts[@]}" -eq 1
          ./packaging/smoke_test.sh "${artifacts[0]}" "dist/smoke-${{ matrix.target_triple }}"

  resilience-check:
    name: Packaging / resilience-check (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.target_matrix) }}
    needs:
      - resolve-targets
      - tarball-assembly
    steps:
      - uses: actions/checkout@v4
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: pipo-runtime-${{ matrix.target_triple }}
          path: dist
      - name: Execute resilience checks
        run: |
          shopt -s nullglob
          artifacts=(dist/pipo-*-${{ matrix.target_triple }}.tar.gz)
          shopt -u nullglob
          test "${#artifacts[@]}" -eq 1
          ./packaging/resilience_test.sh "${artifacts[0]}" "${{ matrix.target_triple }}"

  release-readiness:
    name: Release readiness / matrix target health
    runs-on: ubuntu-latest
    if: always()
    needs:
      - resolve-targets
      - tarball-assembly
      - extract-and-smoke-test
      - resilience-check
    steps:
      - name: Enforce matrix release readiness
        run: |
          echo "Resolve targets: ${{ needs.resolve-targets.result }}"
          echo "Tarball assembly: ${{ needs.tarball-assembly.result }}"
          echo "Smoke checks: ${{ needs.extract-and-smoke-test.result }}"
          echo "Resilience checks: ${{ needs.resilience-check.result }}"
          test "${{ needs.resolve-targets.result }}" = "success"
          test "${{ needs.tarball-assembly.result }}" = "success"
          test "${{ needs.extract-and-smoke-test.result }}" = "success"
          test "${{ needs.resilience-check.result }}" = "success"

  publish-gate:
    name: Publish gate / all ci jobs passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - resolve-targets
      - rust-transport-runtime
      - elixir-pipo-supervisor
      - integration-protocol-supervision
      - release-readiness
    steps:
      - name: Enforce publish gate
        run: |
          echo "Resolve targets: ${{ needs.resolve-targets.result }}"
          echo "Rust job: ${{ needs.rust-transport-runtime.result }}"
          echo "Elixir job: ${{ needs.elixir-pipo-supervisor.result }}"
          echo "Integration job: ${{ needs.integration-protocol-supervision.result }}"
          echo "Release readiness: ${{ needs.release-readiness.result }}"
          test "${{ needs.resolve-targets.result }}" = "success"
          test "${{ needs.rust-transport-runtime.result }}" = "success"
          test "${{ needs.elixir-pipo-supervisor.result }}" = "success"
          test "${{ needs.integration-protocol-supervision.result }}" = "success"
          test "${{ needs.release-readiness.result }}" = "success"
