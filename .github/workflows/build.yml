name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - feature/matrix
      - feature/elixir-supervisor
      - rewrite/go-mainline
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      run_full_parity:
        description: 'Run full parity matrix (including live Slack/Discord API checks)'
        required: false
        default: true
        type: boolean

jobs:
  rust-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install_deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libsqlite3-dev

      - name: Build (Rust)
        run: cargo build --locked --verbose

      - name: Test (Rust)
        run: cargo test --locked --verbose

      - name: Verify protobuf clean regeneration
        run: |
          cargo clean
          cargo build --locked --verbose
          git update-index -q --refresh
          git diff --exit-code -- .

      - name: Verify protobuf major/runtime sanity
        run: |
          versions=$(cargo tree --locked -e normal | rg -o "protobuf v[0-9]+\.[0-9]+\.[0-9]+" | sed 's/^protobuf v//' | cut -d. -f1 | sort -u)
          if echo "$versions" | rg -q '^2$' && echo "$versions" | rg -q '^3$'; then
            echo "Found both protobuf v2 and v3 in dependency tree:" >&2
            cargo tree --locked -e normal | rg "protobuf v"
            exit 1
          fi

          if [ -d src/protos ] && rg -n "Singular(Field|PtrField)|CachedSize|UnknownFields" src/protos; then
            echo "Detected protobuf v2-era symbols in generated output" >&2
            exit 1
          fi

  go-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (Go)
        run: go test ./...

  parity-pr-required:
    name: parity-pr-required (fixtures + local integration subset)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fixture parity (deterministic)
        run: |
          go run ./cmd/parity-harness \
            -fixture docs/parity/fixtures/high-risk.json \
            -artifact-root artifacts/parity \
            -run-id pr-fixture-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Local transport integration subset
        run: |
          go run ./cmd/parity-harness \
            -mode integration \
            -fixture docs/parity/fixtures/integration.json \
            -artifact-root artifacts/parity \
            -run-id pr-integration-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload parity artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: parity-pr-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/parity
          if-no-files-found: warn

  parity-nightly:
    name: parity-nightly (full matrix + live API checks)
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Third-party parity preflight
        env:
          CONFIG_PATH: ${{ runner.temp }}/parity-thirdparty/config.json
          DB_PATH: ${{ runner.temp }}/parity-thirdparty/messages.db
          SLACK_TEST_BOT_TOKEN: ${{ secrets.SLACK_TEST_BOT_TOKEN }}
          SLACK_TEST_APP_TOKEN: ${{ secrets.SLACK_TEST_APP_TOKEN }}
          DISCORD_TEST_BOT_TOKEN: ${{ secrets.DISCORD_TEST_BOT_TOKEN }}
        run: ./scripts/parity-thirdparty-preflight.sh

      - name: Live Slack/Discord API credential check
        env:
          SLACK_TEST_BOT_TOKEN: ${{ secrets.SLACK_TEST_BOT_TOKEN }}
          DISCORD_TEST_BOT_TOKEN: ${{ secrets.DISCORD_TEST_BOT_TOKEN }}
        run: ./scripts/parity-live-api-checks.sh

      - name: Full fixture parity
        run: |
          go run ./cmd/parity-harness \
            -fixture docs/parity/fixtures/high-risk.json \
            -artifact-root artifacts/parity \
            -run-id nightly-fixture-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Full integration parity matrix
        run: |
          go run ./cmd/parity-harness \
            -mode integration \
            -fixture docs/parity/fixtures/integration.json \
            -artifact-root artifacts/parity \
            -run-id nightly-integration-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parity-nightly-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/parity
          if-no-files-found: warn

  parity-manual:
    name: parity-manual (ad hoc full parity)
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Full parity run for release readiness
        run: |
          go run ./cmd/parity-harness \
            -fixture docs/parity/fixtures/high-risk.json \
            -artifact-root artifacts/parity \
            -run-id manual-fixture-${{ github.run_id }}-${{ github.run_attempt }}
          go run ./cmd/parity-harness \
            -mode integration \
            -fixture docs/parity/fixtures/integration.json \
            -artifact-root artifacts/parity \
            -run-id manual-integration-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parity-manual-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/parity
          if-no-files-found: warn

  promotion-trend-gate:
    name: promotion-trend-gate
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Gate on trend metrics instead of single run
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = context.workflow;
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              per_page: 20,
              event: 'schedule'
            });
            const runs = (data.workflow_runs || []).filter(r => r.status === 'completed');
            if (runs.length < 5) {
              core.setFailed(`insufficient trend data for gating: need >=5 scheduled runs, found ${runs.length}`);
              return;
            }
            const successes = runs.filter(r => r.conclusion === 'success').length;
            const failures = runs.filter(r => r.conclusion !== 'success').length;
            const flaky = runs.filter(r => (r.run_attempt || 1) > 1).length;

            const passRate = successes / runs.length;
            const divergenceFrequency = failures / runs.length;
            const flakyIndex = flaky / runs.length;

            core.info(`trend window=${runs.length} pass_rate=${passRate.toFixed(3)} divergence_frequency=${divergenceFrequency.toFixed(3)} flaky_scenario_index=${flakyIndex.toFixed(3)}`);
            if (passRate < 0.95 || divergenceFrequency > 0.10 || flakyIndex > 0.15) {
              core.setFailed(`trend gate failed: pass_rate=${passRate.toFixed(3)} divergence_frequency=${divergenceFrequency.toFixed(3)} flaky_scenario_index=${flakyIndex.toFixed(3)}`);
            }

  rust-package:
    runs-on: ubuntu-latest
    needs: rust-test
    if: ((github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'schedule'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: pipo-rust-x86_64-linux
            bin_path: target/x86_64-unknown-linux-gnu/release/pipo
    steps:
      - uses: actions/checkout@v4

      - name: install_deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libsqlite3-dev

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release artifact (Rust)
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bin_path }}

  go-package:
    runs-on: ubuntu-latest
    needs: go-test
    if: ((github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'schedule'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifact (Go)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/pipo-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/pipo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipo-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/pipo-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release-publish:
    runs-on: ubuntu-latest
    needs:
      - rust-package
      - go-package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pipo-rust-*
          path: dist
          merge-multiple: true

      - name: Download Go artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pipo-go-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
