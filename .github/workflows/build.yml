name: Build

on:
  push:
    branches:
      - 'main'
      - 'feature/**'
      - 'hotfix-artifacts'
  pull_request:
    branches:
      - 'main'
      - 'feature/**'

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: install_deps
        run: sudo apt install -y protobuf-compiler libsqlite3-dev libssl-dev
      - name: build
        run: cargo build --locked --verbose

      - name: test
        run: cargo test --locked --verbose

      - name: verify protobuf clean regeneration
        run: |
          # This runs against the checked-out commit for the PR.
          # It only fails if the build mutates tracked files unexpectedly.
          cargo clean
          cargo build --locked --verbose
          git update-index -q --refresh
          git diff --exit-code -- .

      - name: verify protobuf major/runtime sanity
        run: |
          versions=$(cargo tree --locked -e normal | rg -o "protobuf v[0-9]+\.[0-9]+\.[0-9]+" | sed 's/^protobuf v//' | cut -d. -f1 | sort -u)
          if echo "$versions" | rg -q '^2$' && echo "$versions" | rg -q '^3$'; then
            echo "Found both protobuf v2 and v3 in dependency tree:" >&2
            cargo tree --locked -e normal | rg "protobuf v"
            exit 1
          fi

          if [ -d src/protos ] && rg -n "Singular(Field|PtrField)|CachedSize|UnknownFields" src/protos; then
            echo "Detected protobuf v2-era symbols in generated output" >&2
            exit 1
          fi

      - name: sanitize artifact ref name
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/feature/') || github.ref == 'refs/heads/hotfix-artifacts')
        id: sanitize_ref
        run: |
          safe_ref=$(printf '%s' "${GITHUB_REF_NAME}" | sed 's/[^A-Za-z0-9._-]/-/g')
          echo "safe_ref=${safe_ref}" >> "$GITHUB_OUTPUT"

      - name: Upload branch artifact
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/feature/') || github.ref == 'refs/heads/hotfix-artifacts')
        uses: actions/upload-artifact@v4
        with:
          name: pipo-${{ steps.sanitize_ref.outputs.safe_ref }}-${{ github.sha }}
          path: target/debug/pipo

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: install_deps
        run: sudo apt install -y protobuf-compiler libsqlite3-dev libssl-dev

      - name: Add x86_64 target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Build release artifact (x86_64 Linux)
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipo-x86_64-linux
          path: target/x86_64-unknown-linux-gnu/release/pipo


  release-debian12:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/'))
    steps:
      - uses: actions/checkout@v3

      - name: install_deps
        run: |
          apt-get update
          apt-get install -y curl build-essential pkg-config protobuf-compiler libsqlite3-dev libssl-dev ca-certificates

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add x86_64 target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Build release artifact (x86_64 Debian 12)
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipo-x86_64-debian12
          path: target/x86_64-unknown-linux-gnu/release/pipo
